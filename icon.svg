<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1a1a2e"/>
  <g transform="translate(256,256)">
    <!-- Needle -->
    <line x1="-80" y1="80" x2="100" y2="-100" stroke="#e8d5b7" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="110" cy="-110" rx="6" ry="14" fill="#e8d5b7" transform="rotate(-45,110,-110)"/>
    <!-- Thread -->
    <path d="M-80,80 Q-120,40 -90,0 Q-60,-40 -100,-60" stroke="#c4a882" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Grid lines -->
    <line x1="-100" y1="-60" x2="100" y2="-60" stroke="#2a2a4a" stroke-width="1" opacity="0.5"/>
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#2a2a4a" stroke-width="1" opacity="0.5"/>
    <line x1="-100" y1="60" x2="100" y2="60" stroke="#2a2a4a" stroke-width="1" opacity="0.5"/>
    <line x1="-60" y1="-100" x2="-60" y2="100" stroke="#2a2a4a" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#2a2a4a" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="-100" x2="60" y2="100" stroke="#2a2a4a" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
